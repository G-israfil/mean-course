<mat-card>
  @if (loading) {
    <span class="spinner-container">
      <mat-spinner></mat-spinner>
    </span>
  } @else {
    <form [formGroup]="postForm" (submit)="savePost()">
      <mat-form-field>
        <input matInput type="text" placeholder="Title" formControlName="title">
        @if (postForm.controls['title'].invalid){
          <mat-error>
            Post title is mandatory
          </mat-error>
        }
      </mat-form-field>
      <div>
        <button mat-stroked-button type="button" (click)="filePicker.click()">
          Pick Image
        </button>
        <input type="file" hidden="true" (change)="onImageChanged($event)" #filePicker>
      </div>
      @if (imagePreviewString && imagePreviewString !== ''){
        <div class="image-preview">
          <img [src]="imagePreviewString" alt="image-preview">
        </div>
      }
      <mat-form-field>
        <textarea matInput rows="6" placeholder="Content" formControlName="content">
        </textarea>
          @if (postForm.controls['content'].invalid){
            <mat-error>
              Post content is mandatory
            </mat-error>
          }
       </mat-form-field>
      <button color="primary" mat-raised-button type="submit">Save Post</button>
    </form>
    <hr>
  }


</mat-card>
